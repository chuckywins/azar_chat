# Netlify build configuration for Flutter Web.
# Triggers on every push to the connected git branch.
#
# IMPORTANT: AZAR_WS_URL must be set as a Netlify environment variable
# (Site settings → Environment variables) to point at your deployed Fly.io URL,
# e.g.  wss://azar-chat-server.fly.dev

[build]
  base    = "app"
  command = "./netlify_build.sh"
  publish = "build/web"

[build.environment]
  FLUTTER_VERSION = "3.38.0"

# SPA fallback — every route serves index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
