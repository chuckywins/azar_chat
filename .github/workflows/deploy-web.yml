name: Deploy Flutter web to VPS

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: beta
          cache: true

      - name: Pub get
        working-directory: app
        run: flutter pub get

      - name: Build web
        working-directory: app
        env:
          AZAR_WS_URL:       ${{ secrets.AZAR_WS_URL }}
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          flutter build web --release \
            --base-href / \
            --dart-define=AZAR_WS_URL=$AZAR_WS_URL \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
          # Ensure .htaccess lands in build output (Flutter skips dotfiles).
          cp web/.htaccess build/web/.htaccess

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Trust VPS host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SSH_PORT || 22 }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Rsync to VPS
        env:
          DEST: ${{ secrets.WEB_DEPLOY_PATH }}
          PORT: ${{ secrets.SSH_PORT || 22 }}
        run: |
          rsync -az --delete \
            -e "ssh -p $PORT" \
            app/build/web/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:"$DEST/"

      - name: Fix permissions on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 2m
          script: |
            set -e
            bash /opt/azar_chat/infra/vps-fix-web-perms.sh "${{ secrets.WEB_DEPLOY_PATH }}"
