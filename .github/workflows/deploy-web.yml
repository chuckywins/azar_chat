name: Deploy Flutter web to VPS

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: beta
          cache: true

      - name: Pub get
        working-directory: app
        run: flutter pub get

      - name: Build web
        working-directory: app
        env:
          AZAR_WS_URL:       ${{ secrets.AZAR_WS_URL }}
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          flutter build web --release \
            --base-href / \
            --dart-define=AZAR_WS_URL=$AZAR_WS_URL \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
          # Ensure .htaccess lands in build output (Flutter skips dotfiles).
          cp web/.htaccess build/web/.htaccess

      # Pack everything (including dotfiles via `.`) into one tarball
      # — sidesteps SSH-key/libcrypto parsing issues by using the same
      # appleboy stack as the signaling deploy.
      - name: Pack build into tarball
        run: tar -czf web.tar.gz -C app/build/web .

      - name: Upload tarball to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: web.tar.gz
          target: /tmp/azar_web_deploy/
          overwrite: true

      - name: Extract + fix permissions on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 3m
          envs: WEB_DEPLOY_PATH
          script: |
            set -e
            DEST="${{ secrets.WEB_DEPLOY_PATH }}"
            TARBALL="/tmp/azar_web_deploy/web.tar.gz"

            if [ ! -d "$DEST" ]; then
              echo "ERR: $DEST does not exist on VPS" >&2
              exit 1
            fi
            if [ ! -f "$TARBALL" ]; then
              echo "ERR: tarball missing at $TARBALL" >&2
              exit 1
            fi

            echo "==> wiping old contents in $DEST"
            find "$DEST" -mindepth 1 -delete

            echo "==> extracting tarball"
            tar -xzf "$TARBALL" -C "$DEST"

            echo "==> running permission fixer"
            bash /opt/azar_chat/infra/vps-fix-web-perms.sh "$DEST"

            echo "==> cleanup"
            rm -f "$TARBALL"
            echo "==> done."
